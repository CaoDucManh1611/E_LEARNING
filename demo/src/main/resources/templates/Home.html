<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Danh Sach Sinh Vien</title>
  <!-- Lưu ý: Link Bootstrap 5.3.8 có thể không tồn tại, nên dùng 5.3.0 hoặc 5.3.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f5f5; }
    .card { border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; }
    .table thead th {
      background-color: #f8f8f8;
      font-size: 13px;
      color: #888;
      font-weight: 500;
      border-bottom: 1px solid #e0e0e0;
    }
    .table td { vertical-align: middle; font-size: 14px; }
    .btn-edit { background-color: #fff3cd; color: #7a4f00; border: none; font-size: 13px; padding: 4px 12px; border-radius: 6px; text-decoration: none; }
    .btn-del { background-color: #fde8e8; color: #7a1a1a; border: none; font-size: 13px; padding: 4px 12px; border-radius: 6px; }
    .btn-search { background-color: #f0f0f0; color: #555; border: none; font-size: 13px; padding: 4px 12px; border-radius: 6px; text-decoration: none; }
  </style>
</head>
<body>

<div th:replace="~{layout/header :: header('user')}"></div>

<div style="padding: 24px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h5 style="margin: 0;">Danh sách sinh viên</h5>
    <a href="/Create" class="btn btn-primary btn-sm">+ Thêm sinh viên</a>
  </div>

  <div class="card">
    <table class="table table-hover mb-0">
      <thead>
      <tr>
        <th>ID</th>
        <th>Họ tên</th>
        <th>Email</th>
        <th>Role</th>
        <th>Địa chỉ</th>
        <th class="text-center">Thao tác</th>
      </tr>
      </thead>
      <tbody>
      <!-- Duyệt danh sách sinh viên -->
      <tr th:each="sv : ${SinhVien}">
        <td th:text="${sv.id}" style="color: #aaa;"></td>
        <td th:text="${sv.tensv}" class="fw-bold"></td>
        <td th:text="${sv.email}"></td>
        <td th:text="${sv.getRole()}"></td>
        <td th:text="${sv.address}"></td>
        <td>
          <div style="display: flex; gap: 6px; justify-content: center;">
            <!-- Sửa: id=${sv.id} -->
            <a th:href="@{/Update/user/{id}(id=${sv.id})}" class="btn-edit">Sửa</a>

            <!-- Xóa -->
            <form method="post" th:action="@{/Delete/user/{id}(id=${sv.id})}"
                  onsubmit="return confirm('Bạn có chắc chắn muốn xóa?')">
              <button type="submit" class="btn-del">Xóa</button>
            </form>
          </div>
        </td>
      </tr>
      <!-- Hiển thị nếu danh sách trống -->
      <tr th:if="${#lists.isEmpty(SinhVien)}">
        <td colspan="5" class="text-center">Không có sinh viên nào.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
