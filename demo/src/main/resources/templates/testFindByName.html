<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tìm Kiếm Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fafafa; }
        .search-container {
            max-width: 500px;
            margin: 80px auto;
            background: #fff;
            padding: 30px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="search-container text-center">
        <h5 class="mb-4">Tìm kiếm thông tin</h5>

        <form th:action="@{/findByName}" method="post">
            <div class="input-group mb-3">
                <input type="text" name="name" class="form-control"
                       placeholder="Nhập tên sinh viên cần tìm..." required>
                <button class="btn btn-dark" type="submit">Tìm ngay</button>
            </div>
            <div class="mt-3">
                <a href="/Home" class="text-secondary small text-decoration-none">← Quay lại danh sách</a>
            </div>
        </form>

        <!-- Tìm thấy: hiển thị thông tin -->
        <div th:if="${us != null}" class="mt-4 text-start border rounded p-3 bg-light">
            <h6 class="mb-3">Thông tin sinh viên</h6>
            <p><strong>ID:</strong> <span th:text="${us.id}"></span></p>
            <p><strong>Tên:</strong> <span th:text="${us.tensv}"></span></p>
            <p><strong>Email:</strong> <span th:text="${us.email}"></span></p>
            <p><strong>Địa chỉ:</strong> <span th:text="${us.address}"></span></p>
            <p><strong>Role:</strong> <span th:text="${us.role}"></span></p>
        </div>

        <!-- Không tìm thấy -->
        <div th:if="${us == null and searched != null}" class="mt-3 text-danger">
            Không tìm thấy sinh viên!
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
