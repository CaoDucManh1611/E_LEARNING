<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Tìm Kiếm Sinh Viên</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #fafafa; }
    .search-container {
      max-width: 500px;
      margin: 80px auto;
      background: #fff;
      padding: 30px;
      border: 1px solid #dee2e6;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="search-container text-center">
    <h5 class="mb-4">Tìm kiếm thông tin</h5>

    <form th:action="@{/TimKiem}" method="post">
      <div class="input-group mb-3">
        <input type="text" name="name" class="form-control"
               placeholder="Nhập tên sinh viên cần tìm..." required>
        <button class="btn btn-dark" type="submit">Tìm ngay</button>
      </div>

      <div class="mt-3">
        <a href="/Home" class="text-secondary small text-decoration-none">← Quay lại danh sách</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
