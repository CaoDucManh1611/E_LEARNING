<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Đăng nhập - ELearn</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
		.login-wrap { display: flex; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; background: #fff; max-width: 780px; width: 100%; min-height: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.10); }

		/* LEFT PANEL */
		.left-panel { flex: 1; background: #0f2744; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
		.orbit { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08); animation: spin linear infinite; }
		.orbit1 { width: 200px; height: 200px; top: 50%; left: 50%; margin: -100px; animation-duration: 18s; }
		.orbit2 { width: 310px; height: 310px; top: 50%; left: 50%; margin: -155px; animation-duration: 28s; animation-direction: reverse; }
		.orbit3 { width: 420px; height: 420px; top: 50%; left: 50%; margin: -210px; animation-duration: 40s; }
		.dot { position: absolute; width: 7px; height: 7px; border-radius: 50%; top: -3.5px; left: 50%; margin-left: -3.5px; }
		.d1 { background: #5bb8ff; }
		.d2 { background: #7ee8a2; }
		.d3 { background: #f5a623; }
		@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
		.brand-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(91,184,255,0.15); border: 1.5px solid rgba(91,184,255,0.4); display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; z-index: 1; }
		.brand-icon i { font-size: 28px; color: #5bb8ff; }
		.left-title { font-size: 20px; font-weight: 600; color: #fff; z-index: 1; text-align: center; }
		.left-sub { font-size: 13px; color: rgba(255,255,255,0.45); z-index: 1; margin-top: 8px; text-align: center; max-width: 160px; line-height: 1.6; }
		.stats { display: flex; gap: 16px; margin-top: 2rem; z-index: 1; }
		.stat { text-align: center; }
		.stat-n { font-size: 18px; font-weight: 600; color: #5bb8ff; }
		.stat-l { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
		.divider-v { width: 1px; background: rgba(255,255,255,0.1); align-self: stretch; }
		.floating-dots { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; }
		.fdot { position: absolute; border-radius: 50%; animation: fdrift linear infinite; }
		@keyframes fdrift { 0% { transform: translateY(0) scale(1); opacity: 0.6; } 50% { opacity: 1; } 100% { transform: translateY(-80px) scale(0.5); opacity: 0; } }

		/* RIGHT PANEL */
		.right-panel { flex: 1.2; display: flex; flex-direction: column; justify-content: center; padding: 2.5rem 2rem; }
		.right-panel h2 { font-size: 20px; font-weight: 600; color: #1a202c; margin-bottom: 4px; }
		.right-panel p.sub { font-size: 13px; color: #718096; margin-bottom: 2rem; }
		.field-group { margin-bottom: 1rem; }
		.field-label { font-size: 12px; color: #4a5568; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
		.field-label i { font-size: 14px; }
		.field-wrap { position: relative; }
		.field-wrap input { width: 100%; height: 42px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f7fafc; color: #1a202c; font-size: 14px; padding: 0 12px; outline: none; transition: border-color .2s, box-shadow .2s; }
		.field-wrap input:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.12); background: #fff; }
		.toggle-pw { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #718096; display: flex; padding: 2px; }
		.toggle-pw i { font-size: 16px; }
		.btn-login { width: 100%; height: 42px; background: #185fa5; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1.25rem; transition: background .2s, transform .1s; }
		.btn-login:hover { background: #378add; }
		.btn-login:active { transform: scale(0.98); }
		.btn-login i { font-size: 16px; }
		.footer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
		.footer-row a { font-size: 12px; color: #378add; text-decoration: none; }
		.footer-row a:hover { text-decoration: underline; }
		.remember { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #718096; cursor: pointer; }
		.remember input { cursor: pointer; accent-color: #378add; }
		.signup-row { text-align: center; margin-top: 1.25rem; font-size: 12px; color: #718096; }
		.signup-row a { color: #378add; text-decoration: none; }
		.signup-row a:hover { text-decoration: underline; }
		.error-msg { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #c53030; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
		.error-msg i { font-size: 16px; }

		@media (max-width: 580px) {
			.left-panel { display: none; }
			.login-wrap { max-width: 400px; }
		}
	</style>
</head>
<body>
<div class="login-wrap">
	<!-- Left decorative panel -->
	<div class="left-panel">
		<div class="floating-dots" id="fdots"></div>
		<div class="orbit orbit1"><div class="dot d1"></div></div>
		<div class="orbit orbit2"><div class="dot d2"></div></div>
		<div class="orbit orbit3"><div class="dot d3"></div></div>
		<div class="brand-icon"><i class="ti ti-school"></i></div>
		<div class="left-title">ELearn Platform</div>
		<div class="left-sub">Học mọi nơi, mọi lúc — cùng hàng ngàn người</div>
		<div class="stats">
			<div class="stat">
				<div class="stat-n">12K+</div>
				<div class="stat-l">Học viên</div>
			</div>
			<div class="divider-v"></div>
			<div class="stat">
				<div class="stat-n">340+</div>
				<div class="stat-l">Khóa học</div>
			</div>
			<div class="divider-v"></div>
			<div class="stat">
				<div class="stat-n">98%</div>
				<div class="stat-l">Hài lòng</div>
			</div>
		</div>
	</div>

	<!-- Right login form -->
	<div class="right-panel">
		<h2>Chào mừng trở lại</h2>
		<p class="sub">Đăng nhập để tiếp tục hành trình học tập của bạn</p>

		<!-- Hiển thị lỗi nếu có (Thymeleaf) -->
		<div class="error-msg" th:if="${param.error}">
			<i class="ti ti-alert-circle"></i>
			Email hoặc mật khẩu không chính xác. Vui lòng thử lại.
		</div>

		<form method="post" th:action="@{/login}">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

			<div class="field-group">
				<div class="field-label"><i class="ti ti-mail"></i> Email</div>
				<div class="field-wrap">
					<input type="email" name="username" placeholder="example@email.com" required />
				</div>
			</div>

			<div class="field-group">
				<div class="field-label"><i class="ti ti-lock"></i> Mật khẩu</div>
				<div class="field-wrap">
					<input type="password" name="password" id="pw" placeholder="••••••••" required />
					<button type="button" class="toggle-pw" onclick="togglePw()" aria-label="Hiện/ẩn mật khẩu">
						<i class="ti ti-eye" id="pw-icon"></i>
					</button>
				</div>
			</div>

			<div class="footer-row">
				<label class="remember">
					<input type="checkbox" name="remember-me"> Ghi nhớ đăng nhập
				</label>
				<a href="#">Quên mật khẩu?</a>
			</div>

			<button type="submit" class="btn-login">
				<i class="ti ti-login"></i> Đăng nhập
			</button>
		</form>

		<div class="signup-row">
			Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
		</div>
	</div>
</div>

<script>
	function togglePw() {
		var inp = document.getElementById('pw');
		var ic = document.getElementById('pw-icon');
		if (inp.type === 'password') {
			inp.type = 'text';
			ic.className = 'ti ti-eye-off';
		} else {
			inp.type = 'password';
			ic.className = 'ti ti-eye';
		}
	}

	// Floating dots animation
	var fdots = document.getElementById('fdots');
	var colors = ['#5bb8ff', '#7ee8a2', '#f5a623', '#c084fc', '#fb7185'];
	for (var i = 0; i < 12; i++) {
		var d = document.createElement('div');
		d.className = 'fdot';
		var s = Math.random() * 4 + 2;
		var dur = Math.random() * 4 + 4;
		var delay = Math.random() * 5;
		d.style.cssText = 'width:' + s + 'px;height:' + s + 'px;background:' + colors[Math.floor(Math.random() * colors.length)] + ';left:' + (Math.random() * 100) + '%;bottom:' + (Math.random() * 40 + 10) + '%;animation-duration:' + dur + 's;animation-delay:' + delay + 's;opacity:0.5';
		fdots.appendChild(d);
	}
</script>
</body>
</html>
