<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Đăng ký - ELearn</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; }
		.page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
		.register-wrap { display: flex; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; background: #fff; max-width: 820px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.10); }

		/* LEFT */
		.left-panel { flex: 1; background: #0f2744; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
		.orbit { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08); animation: spin linear infinite; }
		.orbit1 { width:200px; height:200px; top:50%; left:50%; margin:-100px; animation-duration:18s; }
		.orbit2 { width:310px; height:310px; top:50%; left:50%; margin:-155px; animation-duration:28s; animation-direction:reverse; }
		.orbit3 { width:420px; height:420px; top:50%; left:50%; margin:-210px; animation-duration:40s; }
		.dot { position:absolute; width:7px; height:7px; border-radius:50%; top:-3.5px; left:50%; margin-left:-3.5px; }
		.d1{background:#5bb8ff} .d2{background:#7ee8a2} .d3{background:#f5a623}
		@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
		.brand-icon { width:64px; height:64px; border-radius:50%; background:rgba(91,184,255,0.15); border:1.5px solid rgba(91,184,255,0.4); display:flex; align-items:center; justify-content:center; margin-bottom:1rem; z-index:1; }
		.brand-icon i { font-size:28px; color:#5bb8ff; }
		.left-title { font-size:20px; font-weight:600; color:#fff; z-index:1; text-align:center; }
		.left-sub { font-size:13px; color:rgba(255,255,255,0.45); z-index:1; margin-top:8px; text-align:center; max-width:160px; line-height:1.6; }
		.steps { display:flex; flex-direction:column; gap:12px; margin-top:2rem; z-index:1; }
		.step { display:flex; align-items:center; gap:10px; }
		.step-num { width:24px; height:24px; border-radius:50%; background:rgba(91,184,255,0.2); border:1px solid rgba(91,184,255,0.5); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#5bb8ff; flex-shrink:0; }
		.step-txt { font-size:12px; color:rgba(255,255,255,0.6); }
		.fdot { position:absolute; border-radius:50%; animation:fdrift linear infinite; }
		@keyframes fdrift { 0%{transform:translateY(0) scale(1);opacity:0.6} 50%{opacity:1} 100%{transform:translateY(-80px) scale(0.5);opacity:0} }

		/* RIGHT */
		.right-panel { flex:1.3; display:flex; flex-direction:column; justify-content:center; padding:2rem 2rem; }
		.right-panel h2 { font-size:20px; font-weight:600; color:#1a202c; margin-bottom:4px; }
		.right-panel p.sub { font-size:13px; color:#718096; margin-bottom:1.5rem; }
		.field-group { margin-bottom:0.85rem; }
		.field-label { font-size:12px; color:#4a5568; margin-bottom:4px; display:flex; align-items:center; gap:5px; }
		.field-label i { font-size:14px; }
		.field-wrap input, .field-wrap select { width:100%; height:40px; border:1px solid #e2e8f0; border-radius:8px; background:#f7fafc; color:#1a202c; font-size:14px; padding:0 12px; outline:none; transition:border-color .2s, box-shadow .2s; appearance:none; }
		.field-wrap input:focus, .field-wrap select:focus { border-color:#378add; box-shadow:0 0 0 3px rgba(55,138,221,0.12); background:#fff; }
		.field-wrap input.is-invalid, .field-wrap select.is-invalid { border-color:#e53e3e; }
		.invalid-msg { font-size:11px; color:#e53e3e; margin-top:3px; }
		.field-row { display:flex; gap:12px; }
		.field-row .field-group { flex:1; }
		.btn-register { width:100%; height:42px; background:#185fa5; border:none; border-radius:8px; color:#fff; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:1rem; transition:background .2s, transform .1s; }
		.btn-register:hover { background:#378add; }
		.btn-register:active { transform:scale(0.98); }
		.login-row { text-align:center; margin-top:1rem; font-size:12px; color:#718096; }
		.login-row a { color:#378add; text-decoration:none; }
		.login-row a:hover { text-decoration:underline; }

		@media(max-width:600px) { .left-panel{display:none} }
	</style>
</head>
<body>


<div class="page-wrap">
	<div class="register-wrap">

		<!-- Left panel -->
		<div class="left-panel">
			<div id="fdots" style="position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;z-index:0;"></div>
			<div class="orbit orbit1"><div class="dot d1"></div></div>
			<div class="orbit orbit2"><div class="dot d2"></div></div>
			<div class="orbit orbit3"><div class="dot d3"></div></div>
			<div class="brand-icon"><i class="ti ti-school"></i></div>
			<div class="left-title">Tham gia ngay!</div>
			<div class="left-sub">Tạo tài khoản và bắt đầu hành trình học tập</div>
			<div class="steps">
				<div class="step"><div class="step-num">1</div><div class="step-txt">Điền thông tin cá nhân</div></div>
				<div class="step"><div class="step-num">2</div><div class="step-txt">Xác nhận email của bạn</div></div>
				<div class="step"><div class="step-num">3</div><div class="step-txt">Khám phá hàng trăm khóa học</div></div>
			</div>
		</div>

		<!-- Right form -->
		<div class="right-panel">
			<h2>Tạo tài khoản</h2>
			<p class="sub">Điền thông tin bên dưới để đăng ký</p>

			<form method="post" th:action="@{/register}" th:object="${SinhVien}">

				<div class="field-group">
					<div class="field-label"><i class="ti ti-user"></i> Họ tên sinh viên</div>
					<div class="field-wrap">
						<input type="text" th:field="*{tensv}" placeholder="Nguyễn Văn A"
						       th:classappend="${#fields.hasErrors('tensv')} ? 'is-invalid'" required />
					</div>
					<div th:if="${#fields.hasErrors('tensv')}" th:errors="*{tensv}" class="invalid-msg"></div>
				</div>

				<div class="field-group">
					<div class="field-label"><i class="ti ti-map-pin"></i> Địa chỉ</div>
					<div class="field-wrap">
						<input type="text" th:field="*{address}" placeholder="TP. Hồ Chí Minh"
						       th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'" />
					</div>
					<div th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="invalid-msg"></div>
				</div>

				<div class="field-group">
					<div class="field-label"><i class="ti ti-mail"></i> Email</div>
					<div class="field-wrap">
						<input type="email" th:field="*{email}" placeholder="example@email.com"
						       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" required />
					</div>
					<div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-msg"></div>
				</div>

				<div class="field-row">
					<div class="field-group">
						<div class="field-label"><i class="ti ti-lock"></i> Mật khẩu</div>
						<div class="field-wrap">
							<input type="password" th:field="*{password}" placeholder="••••••••"
							       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" required />
						</div>
						<div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-msg"></div>
					</div>

					<div class="field-group">
						<div class="field-label"><i class="ti ti-shield"></i> Phân quyền</div>
						<div class="field-wrap">
							<select th:field="*{role}" required>
								<option value="" disabled>-- Chọn quyền --</option>
								<option value="ADMIN">Admin</option>
								<option value="USER">User</option>
							</select>
						</div>
					</div>
				</div>

				<button type="submit" class="btn-register">
					<i class="ti ti-user-plus"></i> Đăng ký ngay
				</button>
			</form>

			<div class="login-row">
				Đã có tài khoản? <a href="/login">Đăng nhập</a>
			</div>
		</div>
	</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
	var fdots = document.getElementById('fdots');
	var colors = ['#5bb8ff','#7ee8a2','#f5a623','#c084fc','#fb7185'];
	for(var i=0;i<12;i++){
		var d=document.createElement('div');
		d.className='fdot';
		var s=Math.random()*4+2, dur=Math.random()*4+4, delay=Math.random()*5;
		d.style.cssText='width:'+s+'px;height:'+s+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+(Math.random()*100)+'%;bottom:'+(Math.random()*40+10)+'%;animation-duration:'+dur+'s;animation-delay:'+delay+'s;opacity:0.5';
		fdots.appendChild(d);
	}
</script>
</body>
</html>
