<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fafafa; color: #333; }
        .detail-card {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #f1f1f1;
        }
        .info-label {
            width: 150px;
            font-weight: 600;
            color: #666;
        }
        .info-value {
            flex: 1;
            color: #111;
        }
        .info-row:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="detail-card">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <h5 class="m-0">Hồ sơ sinh viên</h5>
            <a href="/TimKiem" class="btn btn-outline-secondary btn-sm">Quay lại</a>
        </div>

        <div class="info-row">
            <div class="info-label">Mã số (ID)</div>
            <div class="info-value" th:text="${SinhVien.id}">#001</div>
        </div>

        <div class="info-row">
            <div class="info-label">Họ và tên</div>
            <div class="info-value fw-bold" th:text="${SinhVien.tensv}">Nguyễn Văn A</div>
        </div>

        <div class="info-row">
            <div class="info-label">Email</div>
            <div class="info-value" th:text="${SinhVien.email}">example@gmail.com</div>
        </div>

        <div class="info-row">
            <div class="info-label">Quyền hạn</div>
            <div class="info-value">
                <span class="badge bg-light text-dark border" th:text="${SinhVien.role}">USER</span>
            </div>
        </div>

        <div class="info-row">
            <div class="info-label">Địa chỉ</div>
            <div class="info-value" th:text="${SinhVien.address}">Chưa cập nhật</div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <a th:href="@{/Update/user/{id}(id=${SinhVien.id})}" class="btn btn-dark btn-sm px-4">
                Chỉnh sửa thông tin
            </a>
            <form method="post" th:action="@{/Delete/user/{id}(id=${SinhVien.id})}"
                  onsubmit="return confirm('Xác nhận xóa sinh viên này?')">
                <button type="submit" class="btn btn-outline-danger btn-sm">Xóa tài khoản</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
