<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Từ Chối Truy Cập — EduRecommend</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg:       #faf7f2;
            --surface:  #ffffff;
            --border:   #e4ddd3;
            --green:    #2d6a4f;
            --green2:   #40916c;
            --text:     #1c2b22;
            --muted:    #7a8c80;
            --shadow:   0 10px 30px rgba(45,106,79,.08);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .deny-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            padding: 50px 40px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .icon-lock {
            font-size: 4rem;
            color: #b7791f;
            margin-bottom: 20px;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 12px;
        }

        .message {
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: var(--green);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            transition: background 0.18s;
        }

        .btn-home:hover {
            background: var(--green2);
        }
    </style>
</head>
<body>

<div class="deny-container">
    <div class="icon-lock">🔒</div>
    <h1 class="title">Từ Chối Quyền Truy Cập</h1>
    <p class="message">
        Rất tiếc! Tài khoản của bạn không được phân quyền để truy cập vào tài nguyên hoặc trang quản trị này. Vui lòng liên hệ Admin hoặc quay lại trang chủ.
    </p>
    <a href="/" class="btn-home">Quay Lại Trang Chủ</a>
</div>

</body>
</html>
