<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isUpdate} ? 'Cập Nhật Danh Mục — EduRecommend' : 'Thêm Danh Mục Mới — EduRecommend'">Danh Mục</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg:       #faf7f2;
            --surface:  #ffffff;
            --border:   #e4ddd3;
            --green:    #2d6a4f;
            --green2:   #40916c;
            --green-lt: #d8f3dc;
            --text:     #1c2b22;
            --muted:    #7a8c80;
            --shadow:   0 10px 30px rgba(45,106,79,.08);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            padding: 40px 30px;
            box-shadow: var(--shadow);
        }

        .title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.18s;
        }

        .form-group input:focus {
            border-color: var(--green2);
            background: var(--surface);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 11px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.18s;
            border: none;
            text-align: center;
            text-decoration: none;
        }

        .btn-submit {
            background: var(--green);
            color: white;
            box-shadow: 0 4px 16px rgba(45,106,79,0.2);
        }
        .btn-submit:hover { background: var(--green2); }

        .btn-cancel {
            background: var(--border);
            color: var(--text);
        }
        .btn-cancel:hover { background: #d7cdbe; }
    </style>
</head>
<body>

<div class="form-container">
    <h1 class="title" th:text="${isUpdate} ? 'Cập Nhật Danh Mục' : 'Thêm Danh Mục Mới'">Danh Mục</h1>

    <form th:action="${isUpdate} ? @{/admin/categories/update} : @{/admin/categories/create}" 
          th:object="${category}" method="POST">
        
        <!-- Lưu trữ ID khi cập nhật -->
        <input type="hidden" th:field="*{id}" th:if="${isUpdate}"/>

        <div class="form-group">
            <label for="tenDanhMuc">Tên Danh Mục *</label>
            <input type="text" id="tenDanhMuc" th:field="*{tenDanhMuc}" placeholder="Ví dụ: Công nghệ thông tin" required autocomplete="off"/>
        </div>

        <div class="btn-group">
            <a href="/admin/categories" class="btn btn-cancel">Hủy Bỏ</a>
            <button type="submit" class="btn btn-submit">Lưu Lại</button>
        </div>
    </form>
</div>

</body>
</html>
