<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isUpdate} ? 'Cập Nhật Bài Học — EduRecommend' : 'Thêm Bài Học Mới — EduRecommend'">Bài Học</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg:       #faf7f2;
            --surface:  #ffffff;
            --border:   #e4ddd3;
            --green:    #2d6a4f;
            --green2:   #40916c;
            --green-lt: #d8f3dc;
            --text:     #1c2b22;
            --muted:    #7a8c80;
            --accent:   #b7791f;
            --shadow:   0 10px 30px rgba(45,106,79,.08);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            box-shadow: var(--shadow);
        }

        .title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: -18px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 500;
        }
        .subtitle em { font-style: normal; color: var(--accent); font-weight: 700; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.18s;
        }

        .form-group input[type="file"] {
            background: transparent;
            border: none;
            padding: 4px 0;
            cursor: pointer;
        }

        .form-group input:focus {
            border-color: var(--green2);
            background: var(--surface);
        }

        .current-video-wrap {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 4px;
            font-size: 0.78rem;
            color: var(--muted);
            word-break: break-all;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 11px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.18s;
            border: none;
            text-align: center;
            text-decoration: none;
        }

        .btn-submit {
            background: var(--green);
            color: white;
            box-shadow: 0 4px 16px rgba(45,106,79,0.2);
        }
        .btn-submit:hover { background: var(--green2); }

        .btn-cancel {
            background: var(--border);
            color: var(--text);
        }
        .btn-cancel:hover { background: #d7cdbe; }
        
        .tip {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 2px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1 class="title" th:text="${isUpdate} ? 'Cập Nhật Bài Học' : 'Thêm Bài Học Mới'">Bài Học</h1>
    <div class="subtitle">Khóa học: <em th:text="${course.tenKhoaHoc}">Khóa học</em></div>

    <form th:action="${isUpdate} ? @{/admin/courses/{courseId}/lessons/update(courseId=${course.id})} : @{/admin/courses/{courseId}/lessons/create(courseId=${course.id})}" 
          th:object="${lesson}" method="POST" enctype="multipart/form-data">
        
        <input type="hidden" th:field="*{id}" th:if="${isUpdate}"/>

        <div class="form-group">
            <label for="tieuDe">Tiêu Đề Bài Học *</label>
            <input type="text" id="tieuDe" th:field="*{tieuDe}" placeholder="Ví dụ: Bài 1: Giới thiệu khóa học" required autocomplete="off"/>
        </div>

        <div class="form-group">
            <label for="videoFile">Tệp Tin Video (.mp4, .mkv) *</label>
            <!-- Cho phép chọn file video từ máy cục bộ -->
            <input type="file" id="videoFile" name="videoFile" accept="video/*" th:required="${!isUpdate}"/>
            
            <!-- Hiển thị tên file video hiện tại khi cập nhật -->
            <div class="current-video-wrap" th:if="${isUpdate && lesson.videoUrl != null && !#strings.isEmpty(lesson.videoUrl)}">
                📄 <strong>Video hiện tại:</strong> <span th:text="${lesson.videoUrl}">/uploads/videos/...</span>
            </div>
        </div>

        <div class="form-group">
            <label for="thuTu">Thứ Tự Bài Học *</label>
            <input type="number" id="thuTu" th:field="*{thuTu}" placeholder="Ví dụ: 1" min="1" required/>
        </div>

        <div class="form-group">
            <label for="thoiLuongPhut">Thời Lượng (Phút)</label>
            <input type="number" id="thoiLuongPhut" th:field="*{thoiLuongPhut}" placeholder="Ví dụ: 15" min="1"/>
        </div>

        <div class="btn-group">
            <a th:href="@{/admin/courses/{courseId}/lessons(courseId=${course.id})}" class="btn btn-cancel">Hủy Bỏ</a>
            <button type="submit" class="btn btn-submit">Lưu Lại</button>
        </div>
    </form>
</div>

</body>
</html>
