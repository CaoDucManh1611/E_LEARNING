server.port=8080

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

spring.datasource.url=jdbc:mysql://localhost:3306/doan_khai_pha?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# =============================================
# URL Flask API đang chạy trên Colab + ngrok
# Dán URL ngrok vào đây sau khi chạy Colab
# Ví dụ: https://xxxx-xx-xx-xxx.ngrok-free.app
# =============================================
flask.api.base-url=https://glitzy-confusion-casualty.ngrok-free.dev
flask.api.recommend-endpoint=/recommend
flask.api.health-endpoint=/health
flask.api.skills-endpoint=/skills

# Timeout kết nối tới Flask (ms)
flask.api.connect-timeout=5000
flask.api.read-timeout=15000

# App info
spring.application.name=doan

# Multipart Upload Settings
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB