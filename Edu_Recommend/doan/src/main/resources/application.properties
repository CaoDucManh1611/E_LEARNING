server.port=8080

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

spring.datasource.url=jdbc:mysql://localhost:3306/doan_khai_pha?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# =============================================
# URL Flask API deploy trên Render (24/7, khong can bat Colab)
# https://flask-recommend-api.onrender.com
# =============================================
flask.api.base-url=https://flask-recommend-api.onrender.com
flask.api.recommend-endpoint=/recommend
flask.api.health-endpoint=/health
flask.api.skills-endpoint=/skills

# Timeout: tang len vi Render Free co the cham khi "thuc day"
flask.api.connect-timeout=10000
flask.api.read-timeout=60000

# App info
spring.application.name=doan

# Multipart Upload Settings (Disabled limits for large Video/File Uploads)
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-http-post-size=-1

# Gemini API Key (Điền Key miễn phí lấy từ Google AI Studio vào đây để kích hoạt AI thật)
gemini.api.key=YOUR_GEMINI_API_KEY

# Đường dẫn thư mục lưu file tải lên (Hình ảnh/Video)
app.upload.dir=${user.dir}/uploads/